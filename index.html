<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitTKD Connect</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f3f4f6;
}

header{
background:#111;
color:white;
padding:20px;
text-align:center;
}

.container{
width:90%;
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:15px;
box-shadow:0px 2px 10px rgba(0,0,0,0.2);
}

input, textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#ff4d4d;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#ff1a1a;
}

.post{
margin-top:20px;
padding:15px;
border-top:1px solid #ddd;
}

.post img{
width:100%;
margin-top:10px;
border-radius:10px;
}

.like{
color:red;
cursor:pointer;
font-weight:bold;
}

</style>
</head>

<body>

<header>
<h1>🥋 FitTKD Connect 💪</h1>
<p>Entrenadora TKD e Influencer Fitness</p>
</header>

<div class="container">

<div class="card">
<h2>Nueva actividad</h2>

<input type="text" id="actividad"
placeholder="Ejemplo: Entrenamiento de TKD">

<textarea id="descripcion"
placeholder="¿Qué hicieron hoy?"></textarea>

<input type="file"
id="foto"
accept="image/*">

<button onclick="publicar()">
Subir publicación
</button>

</div>

<div class="card">
<h2>Feed de entrenamiento</h2>

<div id="feed"></div>

</div>

</div>

<script>

let publicaciones=
JSON.parse(localStorage.getItem("publicaciones")) || [];

mostrar();

function publicar(){

let actividad=
document.getElementById("actividad").value;

let descripcion=
document.getElementById("descripcion").value;

let foto=
document.getElementById("foto").files[0];

if(actividad===""){
alert("Escribe una actividad");
return;
}

if(foto){

let lector=new FileReader();

lector.onload=function(e){

let nuevaPublicacion={

actividad:actividad,
descripcion:descripcion,
imagen:e.target.result,
likes:0

};

publicaciones.unshift(nuevaPublicacion);

guardar();

};

lector.readAsDataURL(foto);

}else{

let nuevaPublicacion={

actividad:actividad,
descripcion:descripcion,
imagen:"",
likes:0

};

publicaciones.unshift(nuevaPublicacion);

guardar();

}

}

function guardar(){

localStorage.setItem(
"publicaciones",
JSON.stringify(publicaciones)
);

mostrar();

}

function like(i){

publicaciones[i].likes++;

guardar();

}

function mostrar(){

let feed=document.getElementById("feed");

feed.innerHTML="";

for(let i=0;i<publicaciones.length;i++){

feed.innerHTML+=`

<div class="post">

<h3>${publicaciones[i].actividad}</h3>

<p>${publicaciones[i].descripcion}</p>

${publicaciones[i].imagen
? `<img src="${publicaciones[i].imagen}">`
: ""}

<p class="like"
onclick="like(${i})">

❤️ ${publicaciones[i].likes}

</p>

</div>

`;

}

}

</script>

</body>
</html>
